# fly.toml app configuration file generated for cz-vednemesicnik on 2025-01-31T14:21:10+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cz-vednemesicnik'
primary_region = 'fra'

[build]
  dockerfile = '/docker/fly/Dockerfile'
  ignorefile = '.dockerignore'

[env]
  BASE_URL = 'https://vednemesicnik.cz'
  # Object store backend for images and PDFs (non-secret toggle). Both are served
  # from the Tigris bucket (object storage). Set to 'volume' to fall back to the
  # on-disk Fly volume (see docs/_deploy-to-fly.md → Object storage); change here
  # and `fly deploy`.
  STORE_DRIVER = 'tigris'
  # Break-glass password sign-in (non-secret toggle). Kept 'true' so the password
  # remains the only working sign-in method until an alternative ships (magic link
  # / OAuth). Flip to 'false' once an alternative is deployed. See issue #112.
  ALLOW_PASSWORD_SIGN_IN = 'true'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
