# pnpm 11 enforces a ~24h minimum-release-age supply-chain policy by default.
# Disabled to preserve pnpm 10 install behavior (no release-age gating in CI/dev).
minimumReleaseAge: 0

# pnpm 11 defaults this to "install": before running a script it verifies
# node_modules against the lockfile and reinstalls anything missing. The
# production Docker image ships a prod-only node_modules on purpose, so at
# container startup this would wrongly reinstall the full dev dependency tree
# over the network. Disabled to preserve pnpm 10 behavior (no pre-run check).
verifyDepsBeforeRun: false

# pnpm 11 replaces `onlyBuiltDependencies` (list) with `allowBuilds` (map).
allowBuilds:
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  prisma: true
  sharp: true

# Force a patched hono. It is pulled only by dev/CLI tooling
# (prisma -> @prisma/dev -> @hono/node-server -> hono), and prisma 7.8.0 (latest)
# still resolves the vulnerable hono 4.12.9. Remove once prisma ships a fixed hono.
#
# Pin better-sqlite3 to a release with Node 26 ABI (147) prebuilds. The adapter
# (@prisma/adapter-better-sqlite3) allows ^12.6.0, but the lockfile resolved
# 12.8.0, which ships no Node 26 prebuild and fails to compile in the slim Docker
# image. Remove once the adapter's default resolves to >= 12.11.1.
overrides:
  hono: 4.12.27
  better-sqlite3: 12.11.1
