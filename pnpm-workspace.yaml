# pnpm 11 enforces a ~24h minimum-release-age supply-chain policy by default.
# Disabled to preserve pnpm 10 install behavior (no release-age gating in CI/dev).
minimumReleaseAge: 0

# pnpm 11 replaces `onlyBuiltDependencies` (list) with `allowBuilds` (map).
allowBuilds:
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  prisma: true
  sharp: true

# Force a patched hono. It is pulled only by dev/CLI tooling
# (prisma -> @prisma/dev -> @hono/node-server -> hono), and prisma 7.8.0 (latest)
# still resolves the vulnerable hono 4.12.9. Remove once prisma ships a fixed hono.
overrides:
  hono: 4.12.27
