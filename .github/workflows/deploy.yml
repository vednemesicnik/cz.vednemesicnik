name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

# Deploys queue; a running deploy is never cancelled mid-flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  checks:
    # ci.yml's docker-build job runs dorny/paths-filter, which needs
    # pull-requests:read. A reusable workflow can only use permissions the
    # caller grants, so it must be declared here on the calling job.
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/ci.yml

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    environment:
      name: production
      url: https://vednemesicnik.cz
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@1.6
      # Migrations run at machine startup (docker-entry-point-fly.sh), so back up
      # the still-running old machine BEFORE deploying when this push ships new
      # migrations. base: main is required — the repo default branch is dev, so
      # without it paths-filter diffs against merge-base(dev, main), which is empty
      # at a dev→main release merge and would skip the backup every release. With
      # base pointing at the pushed branch, it diffs against the previous main tip.
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          base: main
          filters: |
            migrations:
              - 'prisma/migrations/**'
      - name: Pre-migration database backup
        if: steps.changes.outputs.migrations == 'true'
        # No continue-on-error: a failed backup must block the deploy.
        run: sh ./scripts/backup-database.sh -pre-migration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only --wait-timeout 5m
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Probe the Fly origin directly, not the public vednemesicnik.cz domain:
      # Cloudflare fronts the public domain and blocks CI runner IPs with 403.
      # The origin confirms the deployed app booted and serves over TLS.
      - name: Smoke test Fly origin /health
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 5 \
            https://cz-vednemesicnik.fly.dev/health
      - name: Show app status
        if: always()
        run: flyctl status --app cz-vednemesicnik
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
