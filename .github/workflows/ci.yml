name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_call:

permissions:
  contents: read

# Cancel stale runs on new pushes to a PR, but never cancel a run
# that was started via workflow_call from the deploy workflow.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4 # reads version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome:check

  typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm app:typecheck

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm app:build
