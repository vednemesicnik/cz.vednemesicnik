name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_call:

permissions:
  contents: read

# Cancel stale runs on new pushes to a PR, but never cancel a run
# that was started via workflow_call from the deploy workflow.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6 # reads version from packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome:check

  typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm app:typecheck

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm app:build

  docker-build:
    runs-on: ubuntu-latest
    # dorny/paths-filter reads the PR's changed files via the API on
    # pull_request events; the top-level contents:read alone is not enough.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'scripts/docker-entry-point*'
              - '.dockerignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'prisma/**'
      - uses: docker/setup-buildx-action@v4
        if: steps.changes.outputs.docker == 'true'
      - uses: docker/build-push-action@v7
        if: steps.changes.outputs.docker == 'true'
        with:
          context: .
          file: docker/fly/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  storybook:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./data/sqlite.db
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm build-storybook
